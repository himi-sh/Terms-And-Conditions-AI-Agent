<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Terms & Conditions Agent</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <header class="tca-header">
    <h1>Terms &amp; Conditions Agent</h1>
    <div style="display:flex;gap:6px">
      <button id="open-analyze" class="tca-btn" type="button" title="Analyze a URL or paste text manually">Analyze</button>
      <button id="refresh" class="tca-btn" type="button" title="Re-scan current tab">Refresh</button>
    </div>
  </header>

  <section id="page-meta" class="tca-card">
    <div class="tca-kv"><span class="tca-k">Page</span><span id="page-title" class="tca-v">—</span></div>
    <div class="tca-kv"><span class="tca-k">URL</span><a id="page-url" class="tca-v tca-link" target="_blank" rel="noreferrer">—</a></div>
    <div class="tca-kv"><span class="tca-k">Type</span><span id="page-type" class="tca-badge">—</span></div>
  </section>

  <section>
    <h2 class="tca-h2">Detected documents</h2>
    <ul id="docs" class="tca-docs"></ul>
    <p id="empty" class="tca-empty" hidden>No terms, privacy, cookie or subscription links detected on this page.</p>
  </section>

  <section id="settings" class="tca-card" hidden>
    <div class="tca-kv">
      <span class="tca-k">API Key</span>
      <div class="tca-key-row">
        <input id="api-key-input" type="password" class="tca-input" placeholder="sk-…" autocomplete="off" />
        <button id="save-key" class="tca-btn">Save</button>
      </div>
    </div>
    <p id="key-status" class="tca-key-status"></p>
  </section>

  <footer class="tca-disclaimer">AI-generated analysis — not legal advice. Review documents independently before accepting.</footer>

  <script type="module" src="panel.js"></script>
</body>
</html>
